<svg width="1200" height="1080" viewBox="0 0 1200 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #020617; }
    .panel { fill: #0f172a; stroke: #164e63; stroke-width: 1.2; }
    .section { fill: #111827; stroke-width: 1.2; }
    .green { stroke: #22c55e; }
    .cyan { stroke: #38bdf8; }
    .orange { stroke: #f97316; }
    .blue { stroke: #0284c7; }
    .title { font: 900 38px 'Segoe UI', Arial, sans-serif; letter-spacing: 4px; fill: #f8fafc; }
    .sectionTitle { font: 800 24px 'Segoe UI', Arial, sans-serif; letter-spacing: 2px; fill: #f8fafc; }
    .small { font: 700 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 1px; fill: #94a3b8; }
    .mono { font: 700 15px 'Consolas', 'Courier New', monospace; fill: #cbd5e1; }
    .accent { fill: #67e8f9; }
    .scan { animation: scan 5.5s linear infinite; opacity: .45; }
    .pulse { animation: pulse 2.4s ease-in-out infinite alternate; }
    @keyframes scan { from { transform: translateY(-170px); } to { transform: translateY(1080px); } }
    @keyframes pulse { from { opacity: .45; } to { opacity: 1; } }
  </style>
  <rect class="bg" width="1200" height="1080" rx="30"/>
  <rect x="0" y="-170" width="1200" height="120" fill="#38bdf8" class="scan"/>
  <rect class="panel" x="42" y="42" width="1116" height="996" rx="26"/>
